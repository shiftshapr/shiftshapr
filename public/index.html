<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>shiftshapr</title>
  <meta name="description" content="shiftshapr">
  <style>
    :root {
      --bg: #070708;
      --bg-elevated: #101014;
      --text: #f2f0ec;
      --muted: #8c8880;
      --accent: #c9a962;
      --ring: rgba(201, 169, 98, 0.35);
      --shadow: rgba(0, 0, 0, 0.55);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 90% 60% at 50% -20%, rgba(201, 169, 98, 0.08), transparent 55%),
        radial-gradient(ellipse 70% 50% at 100% 100%, rgba(80, 120, 180, 0.06), transparent 45%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1.25rem, 4vw, 2.5rem);
    }
    main {
      width: 100%;
      max-width: 26rem;
      text-align: center;
    }
    .card {
      background: var(--bg-elevated);
      border-radius: 1.25rem;
      padding: clamp(1.5rem, 4vw, 2rem);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.04) inset,
        0 24px 48px var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .avatar-wrap {
      margin: 0 auto 1.35rem;
      max-width: 14rem;
      border-radius: 1rem;
      overflow: hidden;
      aspect-ratio: 3 / 4;
      box-shadow: 0 0 0 1px var(--ring), 0 12px 40px var(--shadow);
      background: #0a0a0c;
    }
    .avatar-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    h1 {
      font-size: clamp(1.65rem, 4.5vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      margin: 0 0 0.4rem;
      line-height: 1.15;
    }
    .handle {
      font-size: 0.95rem;
      color: var(--accent);
      font-weight: 500;
      margin: 0 0 1rem;
      letter-spacing: 0.02em;
    }
    p.tagline {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="avatar-wrap">
        <img src="pfp-tall.png" width="560" height="746" alt="shiftshapr" loading="eager" decoding="async">
      </div>
      <h1>shiftshapr</h1>
      <p class="handle">@shiftshapr</p>
      <p class="tagline">Personal site — starting simple. More soon.</p>
    </div>
  </main>
</body>
</html>
