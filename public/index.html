<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>shiftshapr</title>
  <meta name="description" content="shiftshapr — personal site">
  <style>
    :root { --bg: #0c0c0f; --text: #e8e6e3; --muted: #8a8580; --accent: #c4a574; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    h1 { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 600; margin: 0 0 0.75rem; }
    p { margin: 0; color: var(--muted); max-width: 36rem; line-height: 1.55; }
    .domain { color: var(--accent); font-weight: 500; }
    code { font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>shiftshapr</h1>
  <p><span class="domain">shiftshapr.com</span> — static files in <code>public/</code>; API under <code>/api/</code> (see <code>api-server.js</code>, same pattern as <code>nft.xowlz.com</code>).</p>
</body>
</html>
